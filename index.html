<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskDash</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;800&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --teal:#007a6b;
  --navy:#0b1f3a;
  --border:#e5e7eb;
}

body {
  font-family:'Plus Jakarta Sans',sans-serif;
  margin:0;
  background:linear-gradient(160deg,#eefaf7,#ffffff);
}

/* NAV */
nav {
  position:fixed;
  width:100%;
  top:0;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(14px);
  display:flex;
  justify-content:space-between;
  padding:14px 5%;
  z-index:10;
}

.btn {
  background:var(--teal);
  color:#fff;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
}

/* HERO */
.hero {
  padding:120px 5%;
  display:flex;
  justify-content:space-between;
}

.booking-card {
  width:320px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.4);
}

/* chips */
.svc-chip {
  border:1px solid var(--border);
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}
.svc-chip.active {
  background:rgba(0,122,107,0.15);
  border-color:var(--teal);
}

/* modal */
.modal {
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

.modal-content {
  width:90%;
  max-width:420px;
  border-radius:20px;
  padding:20px;
  background:rgba(255,255,255,0.75);
  backdrop-filter:blur(20px);
}

.booking-step { display:none; }

.toast {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:10px 20px;
  border-radius:10px;
  display:none;
}
</style>
</head>

<body>

<nav>
  <div>TaskDash</div>
  <button class="btn" onclick="openModal()">Book</button>
</nav>

<section class="hero">
  <div>
    <h1>Same day help</h1>
    <button class="btn" onclick="openModal()">Start</button>
  </div>

  <div class="booking-card">
    <div class="svc-chip active" onclick="selectChip(this)">Cleaning</div>
    <div class="svc-chip" onclick="selectChip(this)">Lawn</div>
  </div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">

    <div style="height:6px;background:#eee;">
      <div id="progress" style="height:100%;width:33%;background:var(--teal)"></div>
    </div>

    <!-- STEP 1 -->
    <div id="step1" class="booking-step">
      <h3>Select Service</h3>
      <div class="svc-chip active" onclick="selectService(this)">Cleaning</div>
      <div class="svc-chip" onclick="selectService(this)">Lawn</div>
      <button class="btn" onclick="next(2)">Next</button>
    </div>

    <!-- STEP 2 -->
    <div id="step2" class="booking-step">
      <input id="zip" placeholder="ZIP" value="85001"><br><br>
      <input id="time" placeholder="Time" value="Today 2PM"><br><br>
      <button class="btn" onclick="next(3)">Next</button>
    </div>

    <!-- STEP 3 -->
    <div id="step3" class="booking-step">
      <div id="providers"></div>
      <button class="btn" onclick="confirm()">Confirm</button>
    </div>

    <!-- SUCCESS -->
    <div id="success" class="booking-step">
      <h2>Booked 🎉</h2>
      <p id="details"></p>
      <button class="btn" onclick="closeModal()">Done</button>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let booking = {};

function openModal(){
  modal.style.display='flex';
  show(1);
}

function closeModal(){
  modal.style.display='none';
}

function show(n){
  document.querySelectorAll('.booking-step').forEach(s=>s.style.display='none');

  if(n<=3){
    document.getElementById('step'+n).style.display='block';
    progress.style.width=(n*33)+'%';
  }
}

function selectChip(el){
  el.parentElement.querySelectorAll('.svc-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
}

function selectService(el){
  selectChip(el);
  booking.service=el.innerText;
}

function next(n){
  if(n===3){
    booking.zip=zip.value;
    booking.time=time.value;
    loadProviders();
  }
  show(n);
}

function loadProviders(){
  providers.innerHTML=`
    <div onclick="pick(this)">Maria ★</div>
    <div onclick="pick(this)">James ★</div>
  `;

  setTimeout(()=>{
    let first=document.querySelector('#providers div');
    if(first) pick(first);
  },100);
}

function pick(el){
  document.querySelectorAll('#providers div').forEach(d=>d.style.border='none');
  el.style.border='2px solid teal';
  booking.provider=el.innerText;
}

function confirm(){
  if(!booking.provider){
    toastMsg("Pick a provider");
    return;
  }

  details.innerText=
    booking.service+" with "+booking.provider+
    " at "+booking.time+" ("+booking.zip+")";

  document.querySelectorAll('.booking-step').forEach(s=>s.style.display='none');
  success.style.display='block';

  toastMsg("Booked!");
}

function toastMsg(msg){
  toast.innerText=msg;
  toast.style.display='block';
  setTimeout(()=>toast.style.display='none',3000);
}

modal.addEventListener('click',e=>{
  if(e.target===modal) closeModal();
});

window.onload=()=>show(1);
</script>

</body>
</html>
